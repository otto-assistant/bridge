name: Sync Upstream

on:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no new commits'
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/remorses/kimaki.git
          git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream/main
        if: steps.check.outputs.has_new == 'true' || github.event.inputs.force == 'true'
        run: |
          git config user.name "otto-bot"
          git config user.email "bot@otto-assistant.dev"
          git merge upstream/main --no-edit

      - name: Restore Otto customizations
        if: steps.check.outputs.has_new == 'true' || github.event.inputs.force == 'true'
        run: |
          # Upstream will overwrite cli/package.json name back to "kimaki"
          # Restore our scoped package name after every merge
          if [ -f cli/package.json ]; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('cli/package.json', 'utf8'));
              if (pkg.name !== '@otto-assistant/bridge') {
                pkg.name = '@otto-assistant/bridge';
                pkg.repository = 'https://github.com/otto-assistant/bridge';
                pkg.publishConfig = { access: 'public', registry: 'https://registry.npmjs.org' };
                fs.writeFileSync('cli/package.json', JSON.stringify(pkg, null, 2) + '\n');
                console.log('Restored @otto-assistant/bridge package name');
              } else {
                console.log('Package name already correct');
              }
            "
            git add cli/package.json
            git diff --cached --quiet || git commit -m "chore: restore @otto-assistant/bridge package name after upstream sync"
          fi

      - name: Push changes
        if: steps.check.outputs.has_new == 'true' || github.event.inputs.force == 'true'
        run: git push origin main

      - name: Create issue on conflict
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-sync',
              state: 'open'
            });
            // Don't duplicate conflict issues
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ Upstream sync conflict',
                body: `Auto-merge from upstream \`remorses/kimaki\` failed.\n\n**Local:** \`${{ steps.check.outputs.local }}\`\n**Upstream:** \`${{ steps.check.outputs.upstream }}\`\n\nManual resolution needed. After fixing, close this issue and re-run the workflow.`,
                labels: ['upstream-sync', 'conflict']
              });
            }
