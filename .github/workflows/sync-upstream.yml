name: Sync Upstream

on:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no new commits'
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/remorses/kimaki.git
          git fetch upstream main

      - name: Save pinned dependency versions
        id: pinned-deps
        run: |
          # Before merge, save all non-workspace deps from cli/package.json.
          # After merge upstream rewrites them to workspace:^ — we restore the pinned versions.
          node -e "
            const pkg = require('./cli/package.json');
            const pinned = {};
            for (const [name, ver] of Object.entries(pkg.dependencies || {})) {
              if (!ver.startsWith('workspace:')) pinned[name] = ver;
            }
            require('fs').writeFileSync('/tmp/pinned-deps.json', JSON.stringify(pinned));
            console.log('Saved pinned deps:', Object.keys(pinned).join(', '));
          "

      - name: Check for new commits
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream/main
        if: steps.check.outputs.has_new == 'true' || github.event.inputs.force == 'true'
        id: merge
        run: |
          git config user.name "otto-bot"
          git config user.email "bot@otto-assistant.dev"
          if git merge upstream/main --no-edit 2>&1; then
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            # Auto-resolve known conflicts: always keep our package.json header
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            echo "Conflicting files: $CONFLICTS"
            for FILE in $CONFLICTS; do
              if [ "$FILE" = "cli/package.json" ]; then
                # Take our version entirely — the restore step will fix up fields
                git checkout --ours -- "$FILE"
                git add "$FILE"
                echo "Auto-resolved $FILE (kept ours)"
              else
                # For other files, try taking upstream version
                git checkout --theirs -- "$FILE"
                git add "$FILE"
                echo "Auto-resolved $FILE (took upstream)"
              fi
            done
            git commit --no-edit
            echo "conflict=true" >> $GITHUB_OUTPUT
          fi

      - name: Restore Otto customizations
        if: steps.check.outputs.has_new == 'true' || github.event.inputs.force == 'true'
        run: |
          # After every merge, ensure cli/package.json has our Otto-specific fields
          # AND pinned npm versions (upstream uses workspace:^ for submodules).
          if [ -f cli/package.json ]; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('cli/package.json', 'utf8'));
              let pinned = {};
              try { pinned = JSON.parse(fs.readFileSync('/tmp/pinned-deps.json', 'utf8')); } catch {}
              let changed = false;
              if (pkg.name !== '@otto-assistant/bridge') {
                pkg.name = '@otto-assistant/bridge';
                changed = true;
              }
              if (pkg.repository !== 'https://github.com/otto-assistant/bridge') {
                pkg.repository = 'https://github.com/otto-assistant/bridge';
                changed = true;
              }
              if (!pkg.publishConfig || pkg.publishConfig.access !== 'public') {
                pkg.publishConfig = { access: 'public', registry: 'https://registry.npmjs.org' };
                changed = true;
              }
              // Restore pinned npm versions: upstream rewrites submodule deps to workspace:^
              for (const [name, ver] of Object.entries(pinned)) {
                if (pkg.dependencies[name] && pkg.dependencies[name] !== ver) {
                  pkg.dependencies[name] = ver;
                  changed = true;
                  console.log('Restored ' + name + ': ' + pkg.dependencies[name] + ' -> ' + ver);
                }
              }
              if (changed) {
                fs.writeFileSync('cli/package.json', JSON.stringify(pkg, null, 2) + '\n');
                console.log('Restored Otto customizations in cli/package.json');
              } else {
                console.log('Package already correct');
              }
            "
            git add cli/package.json
            git diff --cached --quiet || git commit -m "chore: restore @otto-assistant/bridge customizations after upstream sync"
          fi
          # Update lockfile if package.json deps changed
          # NPM_TOKEN warn is harmless — it's only needed for publishing, not installing public packages.
          # Temporarily unset it to suppress the .npmrc env substitution warning.
          NPM_TOKEN= pnpm install --no-frozen-lockfile
          git add pnpm-lock.yaml
          git diff --cached --quiet || git commit -m "chore: update pnpm-lock.yaml after upstream sync"

      - name: Push changes
        if: steps.check.outputs.has_new == 'true' || github.event.inputs.force == 'true'
        run: git push origin main

      - name: Create issue on conflict
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-sync',
              state: 'open'
            });
            // Don't duplicate conflict issues
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ Upstream sync conflict',
                body: `Auto-merge from upstream \`remorses/kimaki\` failed.\n\n**Local:** \`${{ steps.check.outputs.local }}\`\n**Upstream:** \`${{ steps.check.outputs.upstream }}\`\n\nManual resolution needed. After fixing, close this issue and re-run the workflow.`,
                labels: ['upstream-sync', 'conflict']
              });
            }
